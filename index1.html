<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Manager ERP</title>
    <style>
        :root {
            --primary-color: #6f4e37; /* 커피색 */
            --secondary-color: #ecf0f1;
            --accent-color: #e67e22;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            background-color: #f4f4f4;
            color: var(--text-color);
        }

        /* 사이드바 스타일 */
        nav {
            width: 250px;
            background-color: var(--primary-color);
            color: white;
            height: 100vh;
            padding: 20px;
            position: fixed;
        }

        nav h1 {
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav ul li {
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        nav ul li:hover {
            background-color: rgba(255,255,255,0.2);
        }

        /* 메인 컨텐츠 영역 */
        main {
            margin-left: 290px;
            padding: 30px;
            width: calc(100% - 290px);
        }

        .section {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .active {
            display: block;
        }

        /* 대시보드 카드 */
        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        /* 테이블 스타일 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: var(--secondary-color);
        }

        /* 폼 스타일 */
        .form-group {
            margin-bottom: 15px;
        }

        input, select {
            padding: 8px;
            width: 100%;
            margin-top: 5px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <nav>
        <h1>☕ 카페 ERP</h1>
        <ul>
            <li onclick="showSection('dashboard')">대시보드</li>
            <li onclick="showSection('sales')">매출 등록</li>
            <li onclick="showSection('inventory')">재고 관리</li>
        </ul>
    </nav>

    <main>
        <!-- 1. 대시보드 섹션 -->
        <section id="dashboard" class="section active">
            <h2>오늘의 현황</h2>
            <div class="dashboard-cards">
                <div class="card">
                    <h3>오늘 매출</h3>
                    <p id="today-total-sales">0원</p>
                </div>
                <div class="card">
                    <h3>판매 건수</h3>
                    <p id="today-sales-count">0건</p>
                </div>
                <div class="card" style="background-color: #c0392b;">
                    <h3>부족 재고</h3>
                    <p id="low-stock-count">0개</p>
                </div>
            </div>
            <h3>최근 판매 내역</h3>
            <table id="recent-sales-table">
                <thead>
                    <tr>
                        <th>시간</th>
                        <th>메뉴명</th>
                        <th>수량</th>
                        <th>금액</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 데이터가 여기에 쌓임 -->
                </tbody>
            </table>
        </section>

        <!-- 2. 매출 등록 섹션 -->
        <section id="sales" class="section">
            <h2>매출 등록 (POS)</h2>
            <div style="max-width: 400px;">
                <div class="form-group">
                    <label>메뉴 선택</label>
                    <select id="sale-item-name">
                        <option value="아메리카노" data-price="4500">아메리카노 (4,500원)</option>
                        <option value="카페라떼" data-price="5000">카페라떼 (5,000원)</option>
                        <option value="바닐라라떼" data-price="5500">바닐라라떼 (5,500원)</option>
                        <option value="에이드" data-price="6000">에이드 (6,000원)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>수량</label>
                    <input type="number" id="sale-quantity" value="1" min="1">
                </div>
                <button onclick="addSale()">판매 완료</button>
            </div>
        </section>

        <!-- 3. 재고 관리 섹션 -->
        <section id="inventory" class="section">
            <h2>재고 관리</h2>
            <div style="margin-bottom: 20px;">
                <button onclick="alert('재고 추가 기능은 현재 준비 중입니다.')">+ 새 품목 추가</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>품목명</th>
                        <th>현재고</th>
                        <th>단위</th>
                        <th>상태</th>
                        <th>조정</th>
                    </tr>
                </thead>
                <tbody id="inventory-table-body">
                    <!-- 초기 데이터 -->
                    <tr>
                        <td>원두 (A블렌딩)</td>
                        <td id="stock-bean">15</td>
                        <td>kg</td>
                        <td>정상</td>
                        <td><button onclick="updateStock('bean', 1)">+</button> <button onclick="updateStock('bean', -1)">-</button></td>
                    </tr>
                    <tr>
                        <td>우유</td>
                        <td id="stock-milk">40</td>
                        <td>팩</td>
                        <td>정상</td>
                        <td><button onclick="updateStock('milk', 1)">+</button> <button onclick="updateStock('milk', -1)">-</button></td>
                    </tr>
                    <tr>
                        <td>종이컵</td>
                        <td id="stock-cup">500</td>
                        <td>개</td>
                        <td>정상</td>
                        <td><button onclick="updateStock('cup', 50)">+</button> <button onclick="updateStock('cup', -50)">-</button></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script>
        // 데이터 상태 관리
        let totalSalesAmount = 0;
        let salesCount = 0;
        const salesHistory = [];

        // 섹션 전환 함수
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');
        }

        // 판매 등록 함수
        function addSale() {
            const select = document.getElementById('sale-item-name');
            const itemName = select.value;
            const itemPrice = parseInt(select.options[select.selectedIndex].getAttribute('data-price'));
            const quantity = parseInt(document.getElementById('sale-quantity').value);
            
            const totalItemPrice = itemPrice * quantity;
            const now = new Date().toLocaleTimeString();

            // 상태 업데이트
            totalSalesAmount += totalItemPrice;
            salesCount += 1;

            // 대시보드 업데이트
            document.getElementById('today-total-sales').innerText = totalSalesAmount.toLocaleString() + "원";
            document.getElementById('today-sales-count').innerText = salesCount + "건";

            // 최근 판매 내역 테이블 추가
            const tableBody = document.querySelector('#recent-sales-table tbody');
            const row = `<tr>
                <td>${now}</td>
                <td>${itemName}</td>
                <td>${quantity}</td>
                <td>${totalItemPrice.toLocaleString()}원</td>
            </tr>`;
            tableBody.insertAdjacentHTML('afterbegin', row);

            // 재고 자동 차감 시뮬레이션 (우유 사용 메뉴인 경우)
            if(itemName.includes("라떼")) {
                updateStock('milk', -1);
            }
            updateStock('cup', -quantity);

            alert(`${itemName} ${quantity}잔 판매가 완료되었습니다.`);
            showSection('dashboard');
        }

        // 재고 수량 업데이트 함수
        function updateStock(id, amount) {
            const stockElement = document.getElementById('stock-' + id);
            let currentStock = parseInt(stockElement.innerText);
            currentStock += amount;
            
            if(currentStock < 0) currentStock = 0;
            stockElement.innerText = currentStock;

            // 부족 재고 알림 체크 (임계치: 5)
            updateLowStockCount();
        }

        function updateLowStockCount() {
            const stocks = document.querySelectorAll('[id^="stock-"]');
            let lowCount = 0;
            stocks.forEach(s => {
                if(parseInt(s.innerText) < 10) lowCount++; // 10개 미만일 때 경고
            });
            document.getElementById('low-stock-count').innerText = lowCount + "개";
        }
    </script>
</body>
</html>
