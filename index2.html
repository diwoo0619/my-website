<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tetris</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            gap: 20px;
            border: 4px solid #333;
            padding: 20px;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        canvas {
            border: 2px solid #555;
            background-color: #111;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 120px;
        }

        .stat-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .stat-label { font-size: 14px; color: #aaa; }
        .stat-value { font-size: 24px; font-weight: bold; color: #0ff; }

        #controls {
            margin-top: 20px;
            font-size: 12px;
            color: #777;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #0ff;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover { background: #00cccc; }
    </style>
</head>
<body>

    <h1 id="welcome">NEON TETRIS</h1>

    <div id="game-container">
        <canvas id="tetris" width="240" height="480"></canvas>

        <div class="side-panel">
            <div class="stat-box">
                <div class="stat-label">SCORE</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">NEXT</div>
                <canvas id="next" width="80" height="80"></canvas>
            </div>
            <button onclick="resetGame()">RESTART</button>
        </div>
    </div>

    <div id="controls">
        ← → : 이동 | ↑ : 회전 | ↓ : 소프트 드롭 | Space : 하드 드롭
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');

        context.scale(24, 24);
        nextContext.scale(20, 20);

        let nickname = '';

        function askNickname() {
            nickname = prompt('닉네임을 입력하세요!') || '플레이어';
            document.getElementById('welcome').innerText = `${nickname}님 반가워요!`;
        }

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            else if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            else if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            else if (type === 'O') return [[4,4],[4,4]];
            else if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            else if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            else if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        const colors = [
            null, '#00f0f0','#f0a000','#0000f0','#f0f000','#f00000','#00f000','#a000f0'
        ];

        function createMatrix(w,h){
            const matrix=[];
            while(h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function drawMatrix(matrix, offset, ctx){
            matrix.forEach((row,y)=>{
                row.forEach((value,x)=>{
                    if(value!==0){
                        ctx.fillStyle=colors[value];
                        ctx.fillRect(x+offset.x,y+offset.y,1,1);
                        ctx.strokeStyle='#000';
                        ctx.lineWidth=0.05;
                        ctx.strokeRect(x+offset.x,y+offset.y,1,1);
                    }
                });
            });
        }

        function collide(arena,player){
            const [m,o]=[player.matrix,player.pos];
            for(let y=0;y<m.length;++y){
                for(let x=0;x<m[y].length;++x){
                    if(m[y][x]!==0 && (arena[y+o.y] && arena[y+o.y][x+o.x])!==0){
                        return true;
                    }
                }
            }
            return false;
        }

        function arenaSweep(){
            let rowCount=1;
            outer: for(let y=arena.length-1;y>0;--y){
                for(let x=0;x<arena[y].length;++x){
                    if(arena[y][x]===0) continue outer;
                }
                const row=arena.splice(y,1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score+=rowCount*10;
            }
        }

        function merge(arena,player){
            player.matrix.forEach((row,y)=>{
                row.forEach((value,x)=>{
                    if(value!==0){
                        arena[y+player.pos.y][x+player.pos.x]=value;
                    }
                });
            });
        }

        function rotate(matrix,dir){
            for(let y=0;y<matrix.length;++y){
                for(let x=0;x<y;++x){
                    [matrix[x][y],matrix[y][x]]=[matrix[y][x],matrix[x][y]];
                }
            }
            if(dir>0) matrix.forEach(row=>row.reverse());
            else matrix.reverse();
        }

        function playerDrop(){
            player.pos.y++;
            if(collide(arena,player)){
                player.pos.y--;
                merge(arena,player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter=0;
        }

        function playerMove(dir){
            player.pos.x+=dir;
            if(collide(arena,player)) player.pos.x-=dir;
        }

        function playerReset(){
            const pieces='ILJOTSZ';
            if(player.next===null){
                player.matrix=createPiece(pieces[pieces.length*Math.random()|0]);
            } else {
                player.matrix=player.next;
            }
            player.next=createPiece(pieces[pieces.length*Math.random()|0]);
            player.pos.y=0;
            player.pos.x=(arena[0].length/2|0)-(player.matrix[0].length/2|0);

            if(collide(arena,player)){
                arena.forEach(row=>row.fill(0));
                player.score=0;
                updateScore();
            }
        }

        function playerRotate(dir){
            const pos=player.pos.x;
            let offset=1;
            rotate(player.matrix,dir);
            while(collide(arena,player)){
                player.pos.x+=offset;
                offset=-(offset+(offset>0?1:-1));
                if(offset>player.matrix[0].length){
                    rotate(player.matrix,-dir);
                    player.pos.x=pos;
                    return;
                }
            }
        }

        function updateScore(){
            document.getElementById('score').innerText=player.score;
        }

        function draw(){
            context.fillStyle='#111';
            context.fillRect(0,0,canvas.width,canvas.height);
            nextContext.fillStyle='#111';
            nextContext.fillRect(0,0,nextCanvas.width,nextCanvas.height);

            drawMatrix(arena,{x:0,y:0},context);
            drawMatrix(player.matrix,player.pos,context);
            drawMatrix(player.next,{x:1,y:1},nextContext);
        }

        let dropCounter=0;
        let dropInterval=1000;
        let lastTime=0;

        function update(time=0){
            const deltaTime=time-lastTime;
            lastTime=time;
            dropCounter+=deltaTime;
            if(dropCounter>dropInterval){
                playerDrop();
            }
            draw();
            requestAnimationFrame(update);
        }

        function resetGame(){
            arena.forEach(row=>row.fill(0));
            player.score=0;
            playerReset();
            updateScore();
        }

        const arena=createMatrix(10,20);
        const player={
            pos:{x:0,y:0},
            matrix:null,
            next:null,
            score:0,
        };

        document.addEventListener('keydown',event=>{
            if(event.keyCode===37) playerMove(-1);
            else if(event.keyCode===39) playerMove(1);
            else if(event.keyCode===40) playerDrop();
            else if(event.keyCode===38) playerRotate(1);
            else if(event.keyCode===32){
                while(!collide(arena,player)){
                    player.pos.y++;
                }
                player.pos.y--;
                merge(arena,player);
                playerReset();
                arenaSweep();
                updateScore();
            }
        });

        askNickname();  // ⭐ 추가된 부분
        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
